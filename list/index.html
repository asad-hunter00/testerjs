<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List Design</title>
    <link rel="stylesheet" href="/list/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<body>
    <main id="box">
        <div class="container">
            <h1>To Do List</h1>

            <div class="list">
                <div class="top">
                    <input type="text" placeholder="Yangi shart qo‘shing">
                    <button>+</button>
                </div>

                <div class="task">
                    <div class="left">
                        <input type="checkbox">
                        <span>Uy vazifasini bajarish</span>
                    </div>
                    <span class="delete" onclick="this.parentElement.remove()">×</span>
                </div>

                <div class="task">
                    <div class="left">
                        <input type="checkbox">
                        <span>yugurish</span>
                    </div>
                    <span class="delete" onclick="this.parentElement.remove()">×</span>
                </div>

                <div class="task">
                    <div class="left">
                        <input type="checkbox">
                        <span>kitob o‘qish</span>
                    </div>
                    <span class="delete" onclick="this.parentElement.remove()">×</span>
                </div>

                <div class="task">
                    <div class="left">
                        <input type="checkbox">
                        <span>darslarni takrorlash</span>
                    </div>
                    <span class="delete" onclick="this.parentElement.remove()">×</span>
                </div>

                <div class="task">
                    <div class="left">
                        <input type="checkbox">
                        <span>kundalik ishlar</span>
                    </div>
                    <span class="delete" onclick="this.parentElement.remove()">×</span>
                </div>
            </div>

            <textarea name="area" id="area" placeholder="Bu yerga qo'shimcha ish"></textarea>
        </div>
    </main>








    <script src="./java.js"></script>
</body>

</html>
