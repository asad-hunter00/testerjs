<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe O'yini</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f2f5; }
        h1 { color: #333; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 5px; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background-color: #fff; border: 2px solid #333; 
                display: flex; align-items: center; justify-content: center; font-size: 2.5rem; 
                font-weight: bold; cursor: pointer; transition: 0.3s; }
        .cell:hover { background-color: #e9ecef; }
        .status { margin-top: 20px; font-size: 1.2rem; font-weight: bold; }
        button { margin-top: 20px; padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Tic-Tac-Toe</h1>
    <div class="status" id="status">Navbat: X</div>
    
    <div class="board" id="board">
        <!-- Kataklar JS orqali yaratiladi -->
    </div>

    <button onclick="resetGame()">O'yinni yangilash</button>

    <script>
        let boardState = [['', '', ''], ['', '', ''], ['', '', '']]; // 3x3 Matritsa
        let currentPlayer = 'X';
        let gameActive = true;

        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        // Maydonni chizish
        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.innerText = boardState[r][c];
                    cell.addEventListener('click', handleMove);
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleMove(e) {
            const row = e.target.dataset.row;
            const col = e.target.dataset.col;

            if (boardState[row][col] !== '' || !gameActive) return;

            boardState[row][col] = currentPlayer;
            e.target.innerText = currentPlayer;

            if (checkWinner()) {
                statusElement.innerText = `G'alaba: ${currentPlayer}! 🎉`;
                gameActive = false;
            } else if (isDraw()) {
                statusElement.innerText = "Durang! 🤝";
                gameActive = false;
            } else {
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                statusElement.innerText = `Navbat: ${currentPlayer}`;   
            }
        }

        function checkWinner() {
            // Qatorlar, ustunlar va diagonallarni tekshirish
            for (let i = 0; i < 3; i++) {
                if (boardState[i][0] && boardState[i][0] === boardState[i][1] && boardState[i][0] === boardState[i][2]) return true;
                if (boardState[0][i] && boardState[0][i] === boardState[1][i] && boardState[0][i] === boardState[2][i]) return true;
            }
            if (boardState[0][0] && boardState[0][0] === boardState[1][1] && boardState[0][0] === boardState[2][2]) return true;
            if (boardState[0][2] && boardState[0][2] === boardState[1][1] && boardState[0][2] === boardState[2][0]) return true;
            return false;
        }

        function isDraw() {
            return boardState.flat().every(cell => cell !== '');
        }

        function resetGame() {
            boardState = [['', '', ''], ['', '', ''], ['', '', '']];
            currentPlayer = 'X';
            gameActive = true;
            statusElement.innerText = "Navbat: X";
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
